name: Tests

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - php: '8.2'
            laravel: '^10.0'
            testbench: '^9.0'
          - php: '8.2'
            laravel: '^11.0'
            testbench: '^9.0'
          - php: '8.2'
            laravel: '^12.0'
            testbench: '^10.0'
          - php: '8.3'
            laravel: '^13.0'
            testbench: '^11.0'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: pcov

      - name: Configure test matrix dependencies
        run: composer require --dev "laravel/framework:${{ matrix.laravel }}" "orchestra/testbench:${{ matrix.testbench }}" --with-all-dependencies --no-interaction --no-progress

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress
        
      - name: Check code style
        run: vendor/bin/pint --test

      - name: Run test suite
        run: |
          mkdir -p build/logs
          vendor/bin/phpunit --coverage-clover build/logs/clover.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: build/logs/clover.xml
          fail_ci_if_error: true
